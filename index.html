<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hogwarts Cinematic Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Cinzel', serif;
    background:black;
    color:white;
    overflow:hidden;
}

/* SKY + FOG */
canvas {position:fixed; top:0; left:0; z-index:-2;}
#fog {
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(255,255,255,0.05), transparent);
    animation:fogMove 10s infinite alternate;
    z-index:-1;
}
@keyframes fogMove {
    from {transform:translateY(0);}
    to {transform:translateY(-50px);}
}

/* INTRO */
#intro {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}
#intro h1 {
    font-size:3rem;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from {text-shadow:0 0 10px gold;}
    to {text-shadow:0 0 40px gold;}
}

button {
    padding:12px 30px;
    border:none;
    border-radius:10px;
    background:#5a3fff;
    color:white;
    cursor:pointer;
    margin-top:20px;
}

/* DOORS */
#door {
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    z-index:5;
}
.panel {
    position:absolute;
    width:50%;
    height:100%;
    background:#111;
    transition:2s;
}
#left {left:0;}
#right {right:0;}
.open #left {transform:translateX(-100%);}
.open #right {transform:translateX(100%);}

/* MAIN */
#main {
    display:none;
    text-align:center;
    padding:20px;
}
.card {
    background:rgba(255,255,255,0.05);
    margin:10px;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}
.card:hover {transform:scale(1.05);}
.glow {
    font-size:2rem;
    color:gold;
    opacity:0;
}
.reveal {
    opacity:1;
    text-shadow:0 0 20px gold;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>
<div id="fog"></div>

<div id="intro">
<h1>🦉 The Owl Has Found You...</h1>
<p>Magic awaits beyond what you know.</p>
<button onclick="enter()">Accept the Invitation</button>
</div>

<div id="door">
<div id="left" class="panel"></div>
<div id="right" class="panel"></div>
</div>

<div id="main">
<h1>The Hidden Chronicle</h1>
<div id="quests"></div>
</div>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4b0cb3e9d3.mp3">
</audio>

<audio id="whoosh">
<source src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_7a1fbc6c2e.mp3">
</audio>

<script>
function enter(){
document.getElementById("intro").style.display="none";
document.getElementById("door").style.display="block";
document.getElementById("whoosh").play();

setTimeout(()=>{
document.getElementById("door").classList.add("open");
},500);

setTimeout(()=>{
document.getElementById("door").style.display="none";
document.getElementById("main").style.display="block";
document.getElementById("bgm").play();
},2500);
}

/* STARS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
}
setInterval(draw,40);

/* QUEST */
const letters=["H","A","P","P","Y","B","I","R","T","H","D","A","Y"];
const start=new Date("2026-03-28");
const today=new Date();
const q=document.getElementById("quests");

letters.forEach((l,i)=>{
let d=new Date(start);
d.setDate(start.getDate()+i);

let c=document.createElement("div");
c.className="card";

if(today>=d){
c.innerHTML=`<h3>Day ${i+1}</h3><div id="l${i}" class="glow">?</div>`;
c.onclick=()=>{
let el=document.getElementById("l"+i);
el.innerText=l;
el.classList.add("reveal");
document.getElementById("whoosh").play();
}
}else{
c.innerHTML="<h3>Locked</h3>";
c.style.opacity=0.3;
}

q.appendChild(c);
});
</script>

</body>
</html>
